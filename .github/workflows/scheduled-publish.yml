name: Scheduled Blog Publish

on:
  schedule:
    # Run daily at 00:30 UTC (6:00 AM IST)
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual publish trigger'

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Production Deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" \
            --fail \
            --silent \
            --show-error

      - name: Log trigger
        run: |
          echo "Triggered Vercel deploy at $(date -u)"
          echo "This rebuild will publish any posts with publishDate <= today"
